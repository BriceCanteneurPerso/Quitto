<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1f6f54" />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Quitto" />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>Quitto — Répartis les frais entre amis</title>
    <meta name="description" content="Répartis les frais entre amis, sans compte. Crée un tricount, partage un lien, et c'est parti." />
    <base href="/" />

    <!-- Open Graph (preview enrichi sur iMessage / WhatsApp / Slack / Discord). -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Quitto" />
    <meta property="og:description" content="Répartis les frais entre amis, sans compte." />
    <meta property="og:image" content="icon.svg" />
    <meta property="og:locale" content="fr_FR" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Quitto" />
    <meta name="twitter:description" content="Répartis les frais entre amis, sans compte." />
    <meta name="twitter:image" content="icon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link href="Quitto.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        Une erreur est survenue.
        <a href="." class="reload">Recharger</a>
        <span class="dismiss">×</span>
    </div>

    <script src="https://unpkg.com/qrious@4.0.2/dist/qrious.min.js"></script>
    <script src="js/quitto.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>

    <!-- Service worker : registre dès que l'app a fini de charger. En dev, le SW
         est un no-op ; en prod, il met les assets en cache pour offline + reloads
         quasi instantanés. -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js').catch(err => {
                    console.warn('SW register failed', err);
                });
            });
        }
    </script>
</body>

</html>
