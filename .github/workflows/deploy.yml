name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish (Blazor WASM standalone)
        run: dotnet publish Quitto.csproj -c Release -o release --nologo

      # PNG icons : svgexport (Node) convertit le SVG vectoriel en PNG aux tailles
      # attendues par iOS (apple-touch-icon 180), Android (192/512) et Open Graph (1200×630).
      # Indispensable pour iOS PWA — Safari ne supporte pas les icônes SVG dans manifest.
      - name: Generate PNG icons & OG image from SVG
        run: |
          npx --yes svgexport release/wwwroot/icon.svg      release/wwwroot/icon-180.png 180:180
          npx --yes svgexport release/wwwroot/icon.svg      release/wwwroot/icon-192.png 192:192
          npx --yes svgexport release/wwwroot/icon.svg      release/wwwroot/icon-512.png 512:512
          npx --yes svgexport release/wwwroot/og-image.svg  release/wwwroot/og-image.png 1200:630
          ls -la release/wwwroot/icon-*.png release/wwwroot/og-image.png

      # GitHub Pages servira l'app sous /<repo>/, il faut donc patcher le <base href>.
      - name: Adjust base href for GitHub Pages
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          sed -i "s|<base href=\"/\" />|<base href=\"/${REPO_NAME}/\" />|g" release/wwwroot/index.html
          echo "Base href updated to /${REPO_NAME}/"
          grep -n "<base href" release/wwwroot/index.html

      # Fallback SPA : 404.html → index.html, sinon le router Blazor ne reprend pas la main.
      - name: Create SPA fallback (404.html)
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      # Sans .nojekyll, Pages applique Jekyll qui ignore les dossiers _framework/ etc.
      - name: Disable Jekyll
        run: touch release/wwwroot/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
